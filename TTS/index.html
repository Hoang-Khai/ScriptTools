<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Voice Recorder</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .container { max-width: 700px; margin-top: 50px; }
        .card { border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        #audioContainer audio { width: 100%; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="card p-4">
        <h2 class="mb-4 text-center">Speech Synthesizer & Recorder</h2>
        
        <div class="mb-3">
            <label class="form-label fw-bold">Enter Text</label>
            <textarea id="textInput" class="form-rows form-control" rows="4">Hello! This is a test of the speech synthesis recorder.</textarea>
        </div>

        <div class="row">
            <div class="col-md-8 mb-3">
                <label class="form-label fw-bold">Choose Voice</label>
                <select id="voiceSelect" class="form-select"></select>
            </div>
            <div class="col-md-4 mb-3">
                <label class="form-label fw-bold">Speed (Rate)</label>
                <input type="range" class="form-range" id="rateInput" min="0.5" max="2" step="0.1" value="1">
                <div class="text-center" id="rateValue">1.0x</div>
            </div>
        </div>

        <div class="d-grid gap-2">
            <button id="recordBtn" class="btn btn-primary btn-lg">Generate & Record</button>
            <a id="downloadBtn" class="btn btn-success d-none">Download Audio (.webm)</a>
        </div>

        <div id="status" class="mt-3 text-center text-muted small"></div>
    </div>
</div>

<script>
/** * SPEECH SYNTHESIS RECORDER CLASS (Provided by User)
 */
class SpeechSynthesisRecorder {
  constructor({ text = '', utteranceOptions = {}, recorderOptions = {}, dataType = '' }) {
    if (text === '') throw new Error('no words to synthesize')
    this.dataType = dataType
    this.text = text
    this.mimeType = MediaRecorder.isTypeSupported('audio/webm; codecs=opus') ? 'audio/webm; codecs=opus' : 'audio/ogg; codecs=opus'
    this.utterance = new SpeechSynthesisUtterance(this.text)
    this.speechSynthesis = window.speechSynthesis
    this.mediaStream_ = new MediaStream()
    this.mediaRecorder = new MediaRecorder(this.mediaStream_, {
      mimeType: this.mimeType,
      bitsPerSecond: 256 * 8 * 1024
    })
    this.audioContext = new AudioContext()
    this.chunks = []
    
    // Setup Utterance
    let { voice, lang, rate, pitch, volume } = utteranceOptions;
    if (voice) {
        const selectedVoice = this.speechSynthesis.getVoices().find(v => v.name === voice);
        if(selectedVoice) this.utterance.voice = selectedVoice;
    }
    Object.assign(this.utterance, { lang, rate, pitch, volume });
  }

  start() {
    return navigator.mediaDevices.getUserMedia({ audio: true })
      .then(stream => {
        const track = stream.getAudioTracks()[0]
        this.mediaStream_.addTrack(track)
        
        this.mediaRecorder.ondataavailable = event => {
          if (event.data.size > 0) this.chunks.push(event.data);
        }

        return new Promise(resolve => {
          this.mediaRecorder.onstop = () => {
            track.stop()
            resolve(this)
          }
          this.mediaRecorder.start()
          this.utterance.onend = () => this.mediaRecorder.stop()
          this.speechSynthesis.speak(this.utterance)
        })
      })
  }

  blob() {
    return Promise.resolve(new Blob(this.chunks, { type: this.mimeType }));
  }
}

/**
 * UI CONTROLLER
 */
const voiceSelect = document.getElementById('voiceSelect');
const rateInput = document.getElementById('rateInput');
const rateValue = document.getElementById('rateValue');
const recordBtn = document.getElementById('recordBtn');
const downloadBtn = document.getElementById('downloadBtn');
const textInput = document.getElementById('textInput');
const status = document.getElementById('status');

// Load Voices
function loadVoices() {
    const voices = window.speechSynthesis.getVoices();
    voiceSelect.innerHTML = voices
        .map(v => `<option value="${v.name}">${v.name} (${v.lang})</option>`)
        .join('');
}
window.speechSynthesis.onvoiceschanged = loadVoices;
loadVoices();

// Update Rate Label
rateInput.addEventListener('input', () => {
    rateValue.innerText = rateInput.value + 'x';
});

// Handle Recording
recordBtn.addEventListener('click', async () => {
    try {
        status.innerText = "Recording... Please remain quiet (capturing audio stream).";
        recordBtn.disabled = true;
        downloadBtn.classList.add('d-none');

        const recorder = new SpeechSynthesisRecorder({
            text: textInput.value,
            utteranceOptions: {
                voice: voiceSelect.value,
                rate: parseFloat(rateInput.value),
				pitch: 1,
				volume: 1
            }
        });

        await recorder.start();
        const blob = await recorder.blob();
        
        // Create Download Link
        const url = URL.createObjectURL(blob);
        downloadBtn.href = url;
        downloadBtn.download = `speech_${Date.now()}.webm`;
        downloadBtn.classList.remove('d-none');
        
        status.innerText = "Done! Click green button to save.";
    } catch (err) {
        console.error(err);
        status.innerText = "Error: " + err.message;
    } finally {
        recordBtn.disabled = false;
    }
});
</script>

</body>
</html>
